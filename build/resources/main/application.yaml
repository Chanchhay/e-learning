spring:
  application:
    name: elearning-a01-m1

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/onyxia

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

  datasource:
    username: postgres
    url: jdbc:postgresql://localhost:5432/db_elearning
    driver-class-name: org.postgresql.Driver
server:
  port: 8090
